name: Poll Trump Truth Social

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      max_new:
        description: "(可选) 单次最多推送的新推文数. 留空=默认8. 临时补发可填20."
        required: false
        default: ""

concurrency:
  group: poll
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          MAX_NEW_PER_RUN: ${{ inputs.max_new || vars.MAX_NEW_PER_RUN || '8' }}
          LOG_LEVEL: INFO
        run: python src/bot.py

      - name: Commit state.json if changed
        if: ${{ always() }}
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore(state): update sent_ids [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && \
              git push origin "HEAD:${GITHUB_REF_NAME}" && break || sleep 5
            done
          else
            echo "state.json unchanged."
          fi
